<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大屏预览 - Dashboard Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0D1117; 
            color: white; 
            font-family: "PingFang SC", sans-serif; 
            overflow: hidden; 
            width: 100vw; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #stage {
            position: relative;
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            transform-origin: center center;
        }

        .component {
            position: absolute;
            overflow: hidden;
        }

        /* 简单的组件样式 */
        .comp-chart { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; display: flex; flex-direction: column; }
        .comp-title { font-size: 14px; color: rgba(255,255,255,0.8); margin-bottom: 8px; padding-left: 8px; border-left: 3px solid #00D4FF; }
        .comp-body { flex: 1; display: flex; align-items: flex-end; justify-content: space-around; }
        .comp-bar { width: 20%; background: linear-gradient(0deg, #00D4FF 0%, rgba(0,212,255,0.2) 100%); border-radius: 4px 4px 0 0; transition: height 1s ease; }
        
        .comp-text { display: flex; align-items: center; justify-content: center; text-align: center; }
        
        .comp-image img { width: 100%; height: 100%; object-fit: cover; }

        .loading { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0D1117; display: flex; align-items: center; justify-content: center; z-index: 999; }
        .error { color: #ff4d4f; font-size: 18px; }
    </style>
</head>
<body>
    <div id="loading" class="loading">加载中...</div>
    <div id="stage"></div>

    <script>
        const API_BASE = '/system/templates';
        
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            
            if (!id) {
                showError('未指定模板 ID');
                return;
            }
            
            loadTemplate(id);
            window.addEventListener('resize', fitScreen);
        });

        async function loadTemplate(id) {
            try {
                const token = localStorage.getItem('access_token'); // Assuming shared domain/storage
                const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
                
                const response = await fetch(`${API_BASE}/${id}`, { headers });
                if (!response.ok) throw new Error('无法加载模板数据');
                
                const template = await response.json();
                if (template.config) {
                    const config = JSON.parse(template.config);
                    renderStage(config);
                } else {
                    showError('模板配置为空');
                }
            } catch (error) {
                console.error(error);
                showError('加载失败: ' + error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function renderStage(config) {
            const stage = document.getElementById('stage');
            const canvasConfig = config.canvas || { width: 1920, height: 1080, bg: '#0D1117' };
            
            // 设置舞台尺寸
            stage.style.width = canvasConfig.width + 'px';
            stage.style.height = canvasConfig.height + 'px';
            stage.style.background = canvasConfig.bg;
            
            // 渲染组件
            if (config.components) {
                config.components.forEach(comp => {
                    const el = document.createElement('div');
                    el.className = 'component';
                    Object.assign(el.style, {
                        left: comp.x + 'px',
                        top: comp.y + 'px',
                        width: comp.w + 'px',
                        height: comp.h + 'px',
                        zIndex: comp.z || 1
                    });
                    
                    renderComponentContent(el, comp);
                    stage.appendChild(el);
                });
            }
            
            // 初始适配屏幕
            window.stageWidth = canvasConfig.width;
            window.stageHeight = canvasConfig.height;
            fitScreen();
        }

        function renderComponentContent(el, comp) {
            const props = comp.props || {};
            const type = comp.type;

            if (type === 'html') {
                el.innerHTML = props.html || '<div style="color:#666">HTML Component</div>';
                return;
            }

            if (type.includes('chart')) {
                renderChartComponent(el, props);
                return;
            }

            if (type === 'text') {
                el.innerHTML = `<div class="comp-text" style="width:100%;height:100%;color:${props.color || '#fff'};font-size:${props.fontSize || '24px'};justify-content:${props.align || 'center'}">${escapeHtml(props.text || '文本')}</div>`;
                return;
            }

            if (type === 'image') {
                const src = props.src || 'https://via.placeholder.com/200';
                el.innerHTML = `<div class="comp-image" style="width:100%;height:100%"><img src="${escapeAttr(src)}" alt="img"></div>`;
                return;
            }

            el.innerHTML = `<div style="border:1px dashed #666;width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#888">${escapeHtml(type)}</div>`;
        }

        function renderChartComponent(el, props) {
            const binding = props.dataBinding || {};
            const title = props.title || '图表';

            if (binding.mode === 'api' && binding.apiId) {
                el.innerHTML = buildChartMarkup(title, [], '加载中...');
                const refreshMs = Number(binding.refreshMs) || 0;
                fetchAndRenderApiSeries(el, title, binding);
                if (refreshMs > 0) {
                    setInterval(() => fetchAndRenderApiSeries(el, title, binding), refreshMs);
                }
                return;
            }

            if (binding.mode === 'datasource' && binding.datasourceId) {
                el.innerHTML = buildChartMarkup(title, [], '加载中...');
                const refreshMs = Number(binding.refreshMs) || 0;
                fetchAndRenderDatasourceSeries(el, title, binding);
                if (refreshMs > 0) {
                    setInterval(() => fetchAndRenderDatasourceSeries(el, title, binding), refreshMs);
                }
                return;
            }

            if (binding.mode === 'static' && binding.staticData) {
                try {
                    const series = normalizeToSeries(JSON.parse(binding.staticData));
                    el.innerHTML = buildChartMarkup(title, series);
                } catch {
                    el.innerHTML = buildChartMarkup(title, [], '静态数据格式错误');
                }
                return;
            }

            el.innerHTML = buildChartMarkup(title, [], '未配置数据');
        }

        async function fetchAndRenderDatasourceSeries(el, title, binding) {
            try {
                const dsId = binding.datasourceId;
                const params = parseMaybeJson(binding.params);
                const queryType = binding.queryType || 'query';
                const queryContent = binding.queryContent || '';
                const response = await fetch(`/system/data-sources/${dsId}/execute`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
                    body: JSON.stringify({ queryType, queryContent, params })
                });

                if (!response.ok) {
                    el.innerHTML = buildChartMarkup(title, [], `请求失败(${response.status})`);
                    return;
                }

                const result = await response.json();
                if (!result?.success) {
                    el.innerHTML = buildChartMarkup(title, [], result?.message || '数据加载失败');
                    return;
                }

                const series = normalizeToSeries(result.data);
                el.innerHTML = buildChartMarkup(title, series);
            } catch {
                el.innerHTML = buildChartMarkup(title, [], '数据加载异常');
            }
        }

        async function fetchAndRenderApiSeries(el, title, binding) {
            try {
                const apiId = binding.apiId;
                const params = parseMaybeJson(binding.params);
                const response = await fetch(`/system/apis/${apiId}/test`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
                    body: JSON.stringify({ params })
                });

                if (!response.ok) {
                    el.innerHTML = buildChartMarkup(title, [], `请求失败(${response.status})`);
                    return;
                }

                const result = await response.json();
                if (!result?.success) {
                    el.innerHTML = buildChartMarkup(title, [], result?.message || '数据加载失败');
                    return;
                }

                const series = normalizeToSeries(result.data);
                el.innerHTML = buildChartMarkup(title, series);
            } catch {
                el.innerHTML = buildChartMarkup(title, [], '数据加载异常');
            }
        }

        function buildChartMarkup(title, series, statusText) {
            const safeSeries = Array.isArray(series) ? series : [];
            const max = safeSeries.length ? Math.max(...safeSeries.map(i => Number(i.value) || 0), 1) : 1;
            const bars = safeSeries.length ? safeSeries.slice(0, 6).map(item => {
                const value = Number(item.value) || 0;
                const height = Math.max(4, Math.round((value / max) * 100));
                const label = item.label ?? '';
                return `
                    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;width:18%">
                        <div class="comp-bar" style="width:100%;height:${height}%"></div>
                        <div style="font-size:11px;color:rgba(255,255,255,0.6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%">${escapeHtml(String(label))}</div>
                    </div>
                `;
            }).join('') : `<div style="height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.5);font-size:12px;">${escapeHtml(statusText || '')}</div>`;

            return `
                <div class="comp-chart" style="width:100%;height:100%">
                    <div class="comp-title">${escapeHtml(String(title))}</div>
                    <div class="comp-body" style="gap:10px">
                        ${bars}
                    </div>
                </div>
            `;
        }

        function parseMaybeJson(value) {
            if (!value) return undefined;
            if (typeof value === 'object') return value;
            const str = String(value).trim();
            if (!str) return undefined;
            try {
                return JSON.parse(str);
            } catch {
                return undefined;
            }
        }

        function normalizeToSeries(data) {
            if (Array.isArray(data)) {
                if (data.length === 0) return [];
                if (typeof data[0] === 'number') return data.map((v, idx) => ({ label: String(idx + 1), value: v }));
                if (typeof data[0] === 'object' && data[0] !== null) {
                    return data.map((row, idx) => {
                        const obj = row;
                        const labelKey = ['label', 'name', 'date'].find(k => k in obj) || Object.keys(obj)[0] || 'label';
                        const valueKey = ['value', 'count', 'total', 'sum'].find(k => k in obj) || Object.keys(obj).find(k => typeof obj[k] === 'number') || Object.keys(obj)[1] || 'value';
                        const label = obj[labelKey] ?? String(idx + 1);
                        const value = Number(obj[valueKey]) || 0;
                        return { label, value };
                    });
                }
                return [];
            }
            if (data && typeof data === 'object') {
                if (Array.isArray(data.list)) return normalizeToSeries(data.list);
                if (Array.isArray(data.data)) return normalizeToSeries(data.data);
            }
            if (typeof data === 'number') return [{ label: '值', value: data }];
            return [];
        }

        function getAuthHeaders() {
            const token = localStorage.getItem('access_token');
            return token ? { Authorization: `Bearer ${token}` } : {};
        }

        function escapeHtml(str) {
            return String(str)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function escapeAttr(str) {
            return escapeHtml(str);
        }

        function fitScreen() {
            if (!window.stageWidth) return;
            const stage = document.getElementById('stage');
            const scaleX = window.innerWidth / window.stageWidth;
            const scaleY = window.innerHeight / window.stageHeight;
            const scale = Math.min(scaleX, scaleY); // 保持比例适应
            
            stage.style.transform = `scale(${scale})`;
        }

        function showError(msg) {
            const loading = document.getElementById('loading');
            loading.innerHTML = `<div class="error">${msg}</div>`;
            loading.style.display = 'flex';
        }
    </script>
</body>
</html>
