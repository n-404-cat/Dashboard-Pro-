<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 数据大屏管理系统</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .user-table {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }

        .user-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-cell-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            color: white;
        }

        .user-cell-info {
            display: flex;
            flex-direction: column;
        }

        .user-cell-name {
            font-weight: 500;
            color: var(--text-dark);
        }

        .user-cell-email {
            font-size: 12px;
            color: var(--text-muted);
        }

        .role-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .role-badge.admin {
            background: rgba(220, 53, 69, 0.1);
            color: var(--danger);
        }

        .role-badge.editor {
            background: rgba(74, 144, 217, 0.1);
            color: var(--primary-lighter);
        }

        .role-badge.viewer {
            background: rgba(40, 167, 69, 0.1);
            color: var(--success);
        }

        .table-btn.password {
            color: var(--info);
        }
    </style>
</head>

<body>
    <script src="layout.js"></script>

    <main class="main">
        <div class="page-header">
            <div class="page-title-group">
                <h1 class="page-title">用户管理</h1>
                <div class="breadcrumb"><a
                        href="dashboard.html">首页</a><span>/</span><span>系统设置</span><span>/</span><span>用户管理</span></div>
            </div>
            <button class="btn btn-primary" onclick="openModal('addUserModal')" data-perm="users:create"><span>➕</span>
                新增用户</button>
        </div>

        <div class="filter-bar">
            <select class="filter-select" id="roleFilter" onchange="fetchUsers()">
                <option value="">全部角色</option>
                <option value="admin">管理员</option>
                <option value="editor">编辑者</option>
                <option value="viewer">查看者</option>
            </select>
            <select class="filter-select" id="statusFilter" onchange="fetchUsers()">
                <option value="">全部状态</option>
                <option value="1">激活</option>
                <option value="0">禁用</option>
            </select>
            <input type="text" class="filter-input" placeholder="搜索用户名/邮箱..." id="searchInput"
                oninput="debounceFetch()">
            <button class="btn btn-secondary" onclick="resetFilter()">重置</button>
        </div>

        <div class="user-table">
            <table class="table">
                <thead>
                    <tr>
                        <th>用户</th>
                        <th>角色</th>
                        <th>部门</th>
                        <th>最后登录</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <!-- 数据将通过 API 加载 -->
                </tbody>
            </table>

            <div class="pagination" id="paginationContainer">
                <!-- 分页信息将动态渲染 -->
            </div>
        </div>
    </main>

    <!-- 新增用户模态框 -->
    <div class="modal-overlay" id="addUserModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">新增用户</h3>
                <button class="modal-close" onclick="closeModal('addUserModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">用户名 *</label>
                    <input type="text" class="form-input" id="newUsername" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <input type="email" class="form-input" id="newEmail" placeholder="请输入邮箱">
                </div>
                <div class="form-group">
                    <label class="form-label">密码 *</label>
                    <input type="password" class="form-input" id="newPassword" placeholder="请输入密码">
                </div>
                <div class="form-group">
                    <label class="form-label">角色 *</label>
                    <select class="form-select" id="newRole">
                        <option value="">选择角色</option>
                        <option value="admin">管理员</option>
                        <option value="editor">编辑者</option>
                        <option value="viewer">查看者</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">部门</label>
                    <input type="text" class="form-input" id="newDepartment" placeholder="请输入部门">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('addUserModal')">取消</button>
                <button class="btn btn-primary" onclick="addUser()">创建用户</button>
            </div>
        </div>
    </div>

    <!-- 编辑用户模态框 -->
    <div class="modal-overlay" id="editUserModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">编辑用户</h3>
                <button class="modal-close" onclick="closeModal('editUserModal')">×</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editUserId">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" id="editUsername" readonly
                        style="background: var(--bg-light);">
                </div>
                <div class="form-group">
                    <label class="form-label">昵称</label>
                    <input type="text" class="form-input" id="editNickname">
                </div>
                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <input type="email" class="form-input" id="editEmail">
                </div>
                <div class="form-group">
                    <label class="form-label">手机号</label>
                    <input type="text" class="form-input" id="editPhone">
                </div>
                <div class="form-group">
                    <label class="form-label">状态</label>
                    <select class="form-select" id="editStatus">
                        <option value="1">激活</option>
                        <option value="0">禁用</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">角色</label>
                    <select class="form-select" id="editRole">
                        <option value="">选择角色</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('editUserModal')">取消</button>
                <button class="btn btn-primary" onclick="saveUser()">保存修改</button>
            </div>
        </div>
    </div>

    <!-- 修改密码模块框 -->
    <div class="modal-overlay" id="changePasswordModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">修改密码</h3>
                <button class="modal-close" onclick="closeModal('changePasswordModal')">×</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="pwUserId">
                <div class="form-group">
                    <label class="form-label">新密码 *</label>
                    <input type="password" class="form-input" id="newPasswordInput" placeholder="请输入新密码">
                </div>
                <div class="form-group">
                    <label class="form-label">确认密码 *</label>
                    <input type="password" class="form-input" id="confirmPasswordInput" placeholder="请再次输入新密码">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('changePasswordModal')">取消</button>
                <button class="btn btn-primary" onclick="submitPasswordChange()">提交修改</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API_BASE = '/system/users';
        let users = [];
        let allRoles = [];
        let currentPage = 1;
        let debounceTimer;

        async function fetchRoles() {
            try {
                const response = await fetch('/system/roles');
                allRoles = await response.json();

                const populateSelect = (id) => {
                    const select = document.getElementById(id);
                    if (select) {
                        select.innerHTML = '<option value="">选择角色</option>' +
                            allRoles.map(role => `<option value="${role.id}">${role.roleName}</option>`).join('');
                    }
                };
                populateSelect('newRole');
                populateSelect('editRole');
            } catch (error) {
                console.error('Fetch roles error:', error);
            }
        }

        async function fetchUsers(page = 1) {
            currentPage = page;
            const role = document.getElementById('roleFilter').value;
            const status = document.getElementById('statusFilter').value;
            const username = document.getElementById('searchInput').value;

            let url = `${API_BASE}?page=${page}&pageSize=10`;
            if (role) url += `&role=${role}`;
            if (status) url += `&status=${status}`;
            if (username) url += `&username=${username}`;

            try {
                const response = await fetch(url);
                const result = await response.json();
                users = result.list || [];
                renderUsers(users);
                window.adminLayout.renderPagination('paginationContainer', result.pagination || { total: users.length, page: 1, pageSize: 10, totalPages: 1 }, fetchUsers);
            } catch (err) {
                console.error('Failed to fetch users', err);
                showToast('加载用户列表失败', 'danger');
            }
        }

        function renderUsers(data) {
            const tbody = document.getElementById('userTableBody');
            const displayUsers = data || users;

            if (displayUsers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px; color: var(--text-muted);">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = displayUsers.map(user => {
                const isSuperAdmin = user.username === 'admin';
                const roleNames = user.roles && user.roles.length > 0
                    ? user.roles.map(r => r.roleName).join(', ')
                    : (isSuperAdmin ? '超级管理员' : '待分配');

                const roleClass = isSuperAdmin ? 'admin' : (user.roles?.length > 0 ? 'editor' : 'viewer');

                return `
                    <tr>
                        <td>
                            <div class="user-info-cell">
                                <div class="user-avatar" style="background: ${getAvatarColor(user.username)}">${user.username[0].toUpperCase()}</div>
                                <div style="margin-left: 10px;">
                                    <div class="user-username">${user.username}</div>
                                    <div class="user-email">${user.email || '-'}</div>
                                </div>
                            </div>
                        </td>
                        <td>
                            <span class="role-badge ${roleClass}">${roleNames}</span>
                        </td>
                        <td>${user.nickname || '-'}</td>
                        <td>${user.lastLoginTime ? new Date(user.lastLoginTime).toLocaleString() : '从未登录'}</td>
                        <td>
                            <span class="status-badge ${user.status === 1 ? 'active' : 'inactive'}">
                                <span class="status-dot"></span>${user.status === 1 ? '激活' : '禁用'}
                            </span>
                        </td>
                        <td>
                            <div class="table-actions">
                                ${window.adminLayout.checkPermission('users:update') ? `<button class="table-btn" onclick='openEditModal(${JSON.stringify(user)})' title="编辑">✎ 编辑</button>` : ''}
                                ${window.adminLayout.checkPermission('users:update') ? `<button class="table-btn password" onclick="openPasswordModal(${user.id})" title="密码">🔑 密码</button>` : ''}
                                ${!isSuperAdmin && window.adminLayout.checkPermission('users:delete') ? `<button class="table-btn danger" onclick="deleteUser(${user.id})" title="删除">🗑 删除</button>` : ''}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }


        async function addUser() {
            const username = document.getElementById('newUsername').value;
            const password = document.getElementById('newPassword').value;
            const email = document.getElementById('newEmail').value;
            const roleId = document.getElementById('newRole').value;

            if (!username || !password) {
                showToast('用户名和密码必填', 'danger');
                return;
            }

            try {
                const response = await fetch(API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username,
                        password,
                        email,
                        roleIds: roleId ? [parseInt(roleId)] : []
                    })
                });
                if (response.ok) {
                    showToast('用户创建成功');
                    closeModal('addUserModal');
                    fetchUsers(1);
                } else {
                    const err = await response.json();
                    showToast(err.message || '创建失败', 'danger');
                }
            } catch (err) {
                showToast('网络错误', 'danger');
            }
        }

        function openEditModal(user) {
            document.getElementById('editUserId').value = user.id;
            document.getElementById('editUsername').value = user.username;
            document.getElementById('editNickname').value = user.nickname || '';
            document.getElementById('editEmail').value = user.email || '';
            document.getElementById('editPhone').value = user.phone || '';
            document.getElementById('editStatus').value = user.status;

            // Set role
            const roleSelect = document.getElementById('editRole');
            if (roleSelect) {
                const userRoleId = user.roles && user.roles.length > 0 ? user.roles[0].id : '';
                roleSelect.value = userRoleId;
            }

            openModal('editUserModal');
        }

        async function saveUser() {
            const id = document.getElementById('editUserId').value;
            const roleId = document.getElementById('editRole').value;
            const data = {
                nickname: document.getElementById('editNickname').value,
                email: document.getElementById('editEmail').value,
                phone: document.getElementById('editPhone').value,
                status: parseInt(document.getElementById('editStatus').value),
                roleIds: roleId ? [parseInt(roleId)] : []
            };

            try {
                const response = await fetch(`${API_BASE}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (response.ok) {
                    showToast('保存成功');
                    closeModal('editUserModal');
                    fetchUsers(currentPage);
                }
            } catch (err) {
                showToast('保存失败', 'danger');
            }
        }

        async function deleteUser(id) {
            if (!confirm('确定要禁用该用户吗？')) return;
            try {
                const response = await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showToast('用户已禁用');
                    fetchUsers(currentPage);
                }
            } catch (err) {
                showToast('操作失败', 'danger');
            }
        }

        function openPasswordModal(id) {
            document.getElementById('pwUserId').value = id;
            document.getElementById('newPasswordInput').value = '';
            document.getElementById('confirmPasswordInput').value = '';
            openModal('changePasswordModal');
        }

        async function submitPasswordChange() {
            const id = document.getElementById('pwUserId').value;
            const newPassword = document.getElementById('newPasswordInput').value;
            const confirmPassword = document.getElementById('confirmPasswordInput').value;

            if (!newPassword || newPassword !== confirmPassword) {
                showToast('密码不一致或为空', 'danger');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/${id}/password`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ newPassword })
                });
                if (response.ok) {
                    showToast('密码修改成功');
                    closeModal('changePasswordModal');
                }
            } catch (err) {
                showToast('修改失败', 'danger');
            }
        }

        function debounceFetch() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => fetchUsers(1), 500);
        }

        function resetFilter() {
            document.getElementById('roleFilter').value = '';
            document.getElementById('statusFilter').value = '';
            document.getElementById('searchInput').value = '';
            fetchUsers(1);
        }

        function openModal(id) {
            document.getElementById(id).classList.add('show');
        }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        function getAvatarColor(name) {
            if (!name) return '#667eea';
            const colors = ['#667eea', '#f093fb', '#4facfe', '#fa709a', '#a8edea'];
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length];
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await fetchRoles();
            fetchUsers(1);
        });
    </script>
</body>

</html>
