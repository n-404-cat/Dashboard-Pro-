<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置 - 数据大屏管理系统</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .settings-container { display: grid; grid-template-columns: 240px 1fr; gap: 24px; }
        .settings-nav { background: white; border-radius: 12px; padding: 16px; height: fit-content; }
        .settings-nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 8px; cursor: pointer; transition: all 0.2s; margin-bottom: 4px; }
        .settings-nav-item:hover { background: var(--bg-light); }
        .settings-nav-item.active { background: rgba(30,58,95,0.1); color: var(--primary); font-weight: 500; }
        .settings-nav-item .icon { font-size: 18px; }
        
        .settings-content { background: white; border-radius: 12px; padding: 24px; }
        .settings-section { margin-bottom: 32px; }
        .settings-section:last-child { margin-bottom: 0; }
        .settings-section-title { font-size: 16px; font-weight: 600; color: var(--text-dark); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
        
        .form-label { display: flex; justify-content: space-between; align-items: center; }
        .form-label .desc { font-size: 12px; font-weight: 400; color: var(--text-muted); }
        .form-textarea { font-family: inherit; }
        
        .switch { position: relative; width: 48px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .switch-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: 0.3s; border-radius: 26px; }
        .switch-slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: 0.3s; border-radius: 50%; }
        .switch input:checked + .switch-slider { background-color: var(--primary); }
        .switch input:checked + .switch-slider:before { transform: translateX(22px); }
        
        .info-box { padding: 16px; background: rgba(74,144,217,0.08); border: 1px solid rgba(74,144,217,0.2); border-radius: 8px; display: flex; align-items: flex-start; gap: 12px; margin-bottom: 20px; }
        .info-box-icon { font-size: 20px; }
        .info-box-content { flex: 1; }
        .info-box-title { font-size: 14px; font-weight: 500; color: var(--text-dark); margin-bottom: 4px; }
        .info-box-text { font-size: 13px; color: var(--text-muted); }
        
        @media (max-width: 768px) { .settings-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <!-- 引入布局脚本 -->
    <script src="layout.js"></script>

    <!-- 主内容区 -->
    <main class="main">
        <div class="page-header">
            <div class="page-title-group">
                <h1 class="page-title">系统设置</h1>
                <div class="breadcrumb"><a href="dashboard.html">首页</a><span>/</span><span>系统设置</span></div>
            </div>
        </div>
        
        <div class="settings-container">
            <nav class="settings-nav">
                <div class="settings-nav-item active" onclick="switchSettings(this, 'general')">
                    <span class="icon">⚙️</span>
                    <span>基本设置</span>
                </div>
                <div class="settings-nav-item" onclick="switchSettings(this, 'email')">
                    <span class="icon">📧</span>
                    <span>邮件设置</span>
                </div>
                <div class="settings-nav-item" onclick="switchSettings(this, 'security')">
                    <span class="icon">🔐</span>
                    <span>安全设置</span>
                </div>
                <div class="settings-nav-item" onclick="switchSettings(this, 'upload')">
                    <span class="icon">📁</span>
                    <span>文件存储</span>
                </div>
                <div class="settings-nav-item" onclick="switchSettings(this, 'log')">
                    <span class="icon">📝</span>
                    <span>日志设置</span>
                </div>
            </nav>
            
            <div class="settings-content">
                <!-- 基本设置 -->
                <div class="settings-section" id="general-settings">
                    <h3 class="settings-section-title">基本设置</h3>
                    
                    <div class="info-box">
                        <span class="info-box-icon">ℹ️</span>
                        <div class="info-box-content">
                            <div class="info-box-title">系统基本信息</div>
                            <div class="info-box-text">这些设置将影响整个系统的显示和行为，请谨慎修改。</div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">系统名称 <span class="desc">在浏览器标题和顶部导航中显示</span></label>
                        <input type="text" class="form-input" id="systemName" value="数据大屏管理系统">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">系统Logo</label>
                        <div style="display: flex; align-items: center; gap: 16px;">
                            <div style="width: 64px; height: 64px; background: linear-gradient(135deg, var(--primary), var(--primary-lighter)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px;">📊</div>
                            <button class="btn btn-secondary" onclick="showToast('上传功能开发中')">更换Logo</button>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">系统描述</label>
                        <textarea class="form-textarea" id="systemDesc">一款功能强大的数据可视化大屏管理平台，支持多行业模板、多数据源配置、实时数据更新等功能。</textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">版权信息 <span class="desc">支持 {{year}} 作为年份占位符</span></label>
                        <input type="text" class="form-input" id="copyrightText" value="© {{year}} Dashboard Pro. All rights reserved.">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">时区</label>
                            <select class="form-select" id="timezone">
                                <option value="Asia/Shanghai" selected>中国标准时间 (UTC+8)</option>
                                <option value="Asia/Tokyo">日本标准时间 (UTC+9)</option>
                                <option value="America/New_York">美国东部时间 (UTC-5)</option>
                                <option value="Europe/London">英国标准时间 (UTC+0)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">语言</label>
                            <select class="form-select" id="language">
                                <option value="zh-CN" selected>简体中文</option>
                                <option value="en-US">English</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <!-- 邮件设置 -->
                <div class="settings-section" id="email-settings" style="display: none;">
                    <h3 class="settings-section-title">邮件设置</h3>
                    
                    <div class="form-group">
                        <label class="form-label">SMTP服务器</label>
                        <input type="text" class="form-input" id="smtpHost" placeholder="smtp.example.com">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">SMTP端口</label>
                            <input type="text" class="form-input" id="smtpPort" value="587">
                        </div>
                        <div class="form-group">
                            <label class="form-label">加密方式</label>
                            <select class="form-select" id="smtpEncryption">
                                <option value="tls" selected>TLS</option>
                                <option value="ssl">SSL</option>
                                <option value="none">无</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">发件人邮箱</label>
                        <input type="email" class="form-input" id="smtpFrom" placeholder="noreply@example.com">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <input type="text" class="form-input" id="smtpUsername" placeholder="smtp用户名">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-input" id="smtpPassword" placeholder="smtp密码">
                    </div>
                    
                    <button class="btn btn-secondary" onclick="testEmail()" style="margin-bottom: 20px;">发送测试邮件</button>
                </div>
                
                <!-- 安全设置 -->
                <div class="settings-section" id="security-settings" style="display: none;">
                    <h3 class="settings-section-title">安全设置</h3>
                    
                    <div class="form-group">
                        <label class="form-label">
                            <span>强制HTTPS</span>
                            <span class="desc">所有访问必须通过HTTPS</span>
                        </label>
                        <label class="switch">
                            <input type="checkbox" checked>
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">
                            <span>登录验证码</span>
                            <span class="desc">登录时需要输入验证码</span>
                        </label>
                        <label class="switch">
                            <input type="checkbox">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">
                            <span>双因素认证</span>
                            <span class="desc">启用双因素认证提高账户安全性</span>
                        </label>
                        <label class="switch">
                            <input type="checkbox">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">密码最小长度</label>
                        <select class="form-select" style="width: 120px;">
                            <option>6位</option>
                            <option>8位</option>
                            <option selected>10位</option>
                            <option>12位</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">会话超时时间</label>
                        <select class="form-select" style="width: 200px;">
                            <option>30分钟</option>
                            <option selected>1小时</option>
                            <option>2小时</option>
                            <option>8小时</option>
                            <option>24小时</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">允许IP白名单</label>
                        <textarea class="form-textarea" placeholder="每行一个IP地址，留空表示允许所有IP"></textarea>
                    </div>
                </div>
                
                <!-- 文件存储 -->
                <div class="settings-section" id="upload-settings" style="display: none;">
                    <h3 class="settings-section-title">文件存储</h3>
                    
                    <div class="form-group">
                        <label class="form-label">存储方式</label>
                        <select class="form-select" id="storageType" onchange="toggleStorageOptions()">
                            <option value="local" selected>本地存储</option>
                            <option value="oss">阿里云OSS</option>
                            <option value="s3">AWS S3</option>
                            <option value="cos">腾讯云COS</option>
                        </select>
                    </div>
                    
                    <div id="localOptions">
                        <div class="form-group">
                            <label class="form-label">存储路径</label>
                            <input type="text" class="form-input" value="/data/uploads">
                        </div>
                    </div>
                    
                    <div id="ossOptions" style="display: none;">
                        <div class="form-group">
                            <label class="form-label">AccessKeyId</label>
                            <input type="text" class="form-input" placeholder="请输入AccessKeyId">
                        </div>
                        <div class="form-group">
                            <label class="form-label">AccessKeySecret</label>
                            <input type="password" class="form-input" placeholder="请输入AccessKeySecret">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Bucket名称</label>
                            <input type="text" class="form-input" placeholder="请输入Bucket名称">
                        </div>
                        <div class="form-group">
                            <label class="form-label">地域节点</label>
                            <input type="text" class="form-input" placeholder="如：oss-cn-hangzhou">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">允许上传的文件类型</label>
                        <input type="text" class="form-input" value="jpg,jpeg,png,gif,svg,webp,pdf,doc,docx,xls,xlsx,ppt,pptx">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">单个文件大小限制 (MB)</label>
                        <input type="number" class="form-input" value="10" style="width: 150px;">
                    </div>
                </div>
                
                <!-- 日志设置 -->
                <div class="settings-section" id="log-settings" style="display: none;">
                    <h3 class="settings-section-title">日志设置</h3>
                    
                    <div class="form-group">
                        <label class="form-label">
                            <span>操作日志</span>
                            <span class="desc">记录用户的操作行为</span>
                        </label>
                        <label class="switch">
                            <input type="checkbox" checked>
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">
                            <span>登录日志</span>
                            <span class="desc">记录用户的登录登出行为</span>
                        </label>
                        <label class="switch">
                            <input type="checkbox" checked>
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">
                            <span>错误日志</span>
                            <span class="desc">记录系统错误和异常</span>
                        </label>
                        <label class="switch">
                            <input type="checkbox" checked>
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">日志保留天数</label>
                        <select class="form-select" style="width: 150px;">
                            <option>7天</option>
                            <option selected>30天</option>
                            <option>90天</option>
                            <option>180天</option>
                            <option>365天</option>
                        </select>
                    </div>
                    
                    <button class="btn btn-secondary" onclick="clearLogs()" style="margin-top: 16px;">清理历史日志</button>
                </div>
                
                <div style="margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border);">
                    <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
                    <button class="btn btn-secondary" onclick="resetSettings()" style="margin-left: 12px;">重置</button>
                </div>
            </div>
        </div>
    </main>
    
    <div class="toast-container" id="toastContainer"></div>
    
    <script>
        function switchSettings(el, type) {
            document.querySelectorAll('.settings-nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            
            document.querySelectorAll('.settings-section').forEach(section => section.style.display = 'none');
            document.getElementById(type + '-settings').style.display = 'block';
        }
        
        function toggleStorageOptions() {
            const type = document.getElementById('storageType').value;
            document.getElementById('localOptions').style.display = type === 'local' ? 'block' : 'none';
            document.getElementById('ossOptions').style.display = type === 'oss' ? 'block' : 'none';
        }

        (function loadUiConfig() {
            fetch('/system/ui-config')
                .then((res) => (res.ok ? res.json() : null))
                .then((cfg) => {
                    if (!cfg) return;
                    const el = document.getElementById('copyrightText');
                    if (el && typeof cfg.footerText === 'string') el.value = cfg.footerText;
                })
                .catch(() => {});
        })();
        
        async function saveSettings() {
            const token = localStorage.getItem('access_token');
            const footerText = document.getElementById('copyrightText')?.value;
            try {
                const res = await fetch('/system/ui-config', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
                    },
                    body: JSON.stringify({ footerText }),
                });
                if (!res.ok) throw new Error('save failed');
                showToast('设置已保存');
            } catch {
                showToast('保存失败，请确认已登录且有权限');
            }
        }
        
        function resetSettings() {
            if (confirm('确定要重置所有设置吗？')) {
                document.getElementById('systemName').value = '数据大屏管理系统';
                document.getElementById('systemDesc').value = '';
                const copyrightEl = document.getElementById('copyrightText');
                if (copyrightEl) copyrightEl.value = '© {{year}} Dashboard Pro. All rights reserved.';
                showToast('设置已重置');
            }
        }
        
        function testEmail() {
            showToast('测试邮件已发送，请查收');
        }
        
        function clearLogs() {
            if (confirm('确定要清理所有历史日志吗？此操作不可恢复。')) {
                showToast('日志已清理');
            }
        }
        
        function showToast(message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<span>✓</span><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
