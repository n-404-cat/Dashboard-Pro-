<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据源管理 - 数据大屏管理系统</title>
    <link rel="stylesheet" href="common.css">
    <script src="common/file-upload.js"></script>
    <style>
        .data-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .data-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }

        .data-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .data-icon.mysql {
            background: rgba(0, 117, 143, 0.12);
        }

        .data-icon.postgresql {
            background: rgba(51, 103, 145, 0.12);
        }

        .data-icon.mongodb {
            background: rgba(0, 237, 100, 0.12);
        }

        .data-icon.api {
            background: rgba(74, 144, 217, 0.12);
        }

        .data-icon.proxy {
            background: rgba(255, 193, 7, 0.12);
        }

        .data-icon.cert {
            background: rgba(156, 39, 176, 0.12);
        }

        .data-info {
            flex: 1;
        }

        .data-name {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .data-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .data-meta {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .data-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 8px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: white;
            font-size: 13px;
            cursor: pointer;
        }

        .action-btn:hover {
            border-color: var(--primary-lighter);
            color: var(--primary);
        }

        .action-btn.danger {
            color: var(--danger);
        }

        .action-btn.danger:hover {
            background: rgba(220, 53, 69, 0.1);
        }

        .type-selector {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .type-option {
            padding: 16px 8px;
            border: 2px solid var(--border);
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
        }

        .type-option:hover {
            border-color: var(--primary-lighter);
        }

        .type-option.active {
            border-color: var(--primary);
            background: rgba(30, 58, 95, 0.05);
        }

        .type-option-icon {
            font-size: 28px;
            margin-bottom: 6px;
        }

        .type-option-label {
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .type-selector {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .header-actions {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    </style>
</head>

<body>
    <!-- 引入布局脚本 -->
    <script src="layout.js"></script>

    <!-- 主内容区 -->
    <main class="main">
        <div class="page-header">
            <div class="page-title-group">
                <h1 class="page-title">数据源管理</h1>
                <div class="breadcrumb"><a href="dashboard.html">首页</a><span>/</span><span>数据源管理</span></div>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="window.location.href='ssh-keys.html'" style="margin-right: 10px;">
                    🔑 SSH密钥管理
                </button>
                <button class="btn btn-primary" onclick="openCreateModal()"><span>➕</span> 新增数据源</button>
            </div>
        </div>

        <div class="filter-bar">
            <select class="filter-select" id="typeFilter" onchange="filterDatasources()">
                <option value="">全部类型</option>
                <option value="mysql">MySQL</option>
                <option value="postgresql">PostgreSQL</option>
                <option value="mongodb">MongoDB</option>
                <option value="api">REST API</option>
            </select>
            <input type="text" class="filter-input" placeholder="搜索数据源名称..." id="searchInput" oninput="filterDatasources()">
            <button class="btn btn-primary" onclick="filterDatasources()">🔍 查询</button>
        </div>

        <div class="data-list" id="dataList">
            <!-- 数据源列表将通过 JavaScript 动态加载 -->
        </div>
        
        <!-- 空状态 -->
        <div class="empty-state" id="emptyState" style="display: none; text-align: center; padding: 40px; color: var(--text-muted);">
            <div style="font-size: 48px; margin-bottom: 16px;">🔍</div>
            <div>未找到匹配的数据源</div>
        </div>
        
        <div class="pagination" id="pagination">
            <!-- 分页控件 -->
        </div>
    </main>

    <!-- 新增/编辑数据源模态框 -->
    <div class="modal-overlay" id="createModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">新增数据源</h3>
                <button class="modal-close" onclick="closeModal('createModal')">×</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="dsId">
                <div class="type-selector">
                    <div class="type-option active" onclick="selectType(this, 'mysql')">
                        <div class="type-option-icon">🐬</div>
                        <div class="type-option-label">MySQL</div>
                    </div>
                    <div class="type-option" onclick="selectType(this, 'postgresql')">
                        <div class="type-option-icon">🐘</div>
                        <div class="type-option-label">PostgreSQL</div>
                    </div>
                    <div class="type-option" onclick="selectType(this, 'mongodb')">
                        <div class="type-option-icon">🍃</div>
                        <div class="type-option-label">MongoDB</div>
                    </div>
                    <div class="type-option" onclick="selectType(this, 'api')">
                        <div class="type-option-icon">🔗</div>
                        <div class="type-option-label">REST API</div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">数据源名称 *</label>
                    <input type="text" class="form-input" id="dsName" placeholder="请输入数据源名称">
                </div>
                
                <!-- 动态配置区域 -->
                <div id="configArea">
                    <!-- 数据库配置 -->
                    <div id="dbConfig" class="config-group">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">主机地址 *</label>
                                <input type="text" class="form-input" id="dsHost" placeholder="localhost 或 IP地址">
                            </div>
                            <div class="form-group">
                                <label class="form-label">端口 *</label>
                                <input type="number" class="form-input" id="dsPort" placeholder="3306">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">数据库名 *</label>
                            <input type="text" class="form-input" id="dsDatabase" placeholder="database_name">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">用户名 *</label>
                                <input type="text" class="form-input" id="dsUsername" placeholder="root">
                            </div>
                            <div class="form-group">
                                <label class="form-label">密码 *</label>
                                <input type="password" class="form-input" id="dsPassword" placeholder="password">
                            </div>
                        </div>
                    </div>
                    
                    <!-- API配置 -->
                    <div id="apiConfig" class="config-group" style="display: none;">
                        <div class="form-group">
                            <label class="form-label">基础URL *</label>
                            <input type="text" class="form-input" id="dsUrl" placeholder="https://api.example.com/v1">
                        </div>
                        <div class="form-group">
                            <label class="form-label">认证头 (Header)</label>
                            <input type="text" class="form-input" id="dsAuthHeader" placeholder="Authorization: Bearer token">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">描述</label>
                    <textarea class="form-textarea" id="dsDesc" placeholder="请输入描述" style="height: 60px; width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 8px;"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('createModal')">取消</button>
                <button class="btn btn-primary" onclick="saveDatasource()">保存</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        let selectedType = 'mysql';
        let currentPage = 1;
        let pageSize = 10;
        let currentDatasources = [];

        // 初始化加载
        document.addEventListener('DOMContentLoaded', () => {
            loadDatasources();
        });

        // 加载数据源列表
        async function loadDatasources(page = 1) {
            currentPage = page;
            const dataList = document.getElementById('dataList');
            const emptyState = document.getElementById('emptyState');
            const pagination = document.getElementById('pagination');
            
            emptyState.style.display = 'none';
            pagination.style.display = 'none';
            dataList.innerHTML = '<div style="text-align: center; padding: 20px;">加载中...</div>';
            
            try {
                // 构建查询参数
                const typeFilter = document.getElementById('typeFilter').value;
                const searchText = document.getElementById('searchInput').value;
                
                const params = new URLSearchParams();
                params.append('page', page);
                params.append('pageSize', pageSize);
                if (typeFilter) params.append('sourceType', typeFilter);
                // 后端目前可能不支持 name 模糊搜索，暂时只传 page/pageSize/sourceType
                // 如果需要支持搜索，后端需更新 findAll 逻辑
                
                const response = await fetch(`/system/data-sources?${params.toString()}`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('access_token')}`
                    }
                });
                
                if (!response.ok) throw new Error('Failed to load datasources');
                
                const result = await response.json();
                const { list, pagination: pag } = result;
                currentDatasources = list;
                
                // 简单的客户端过滤（如果后端不支持搜索）
                let displayList = list;
                if (searchText) {
                    const lowerSearch = searchText.toLowerCase();
                    displayList = list.filter(ds => 
                        ds.name.toLowerCase().includes(lowerSearch) || 
                        (ds.description && ds.description.toLowerCase().includes(lowerSearch))
                    );
                }

                if (displayList.length === 0) {
                    dataList.innerHTML = '';
                    emptyState.style.display = 'block';
                    pagination.innerHTML = '';
                    pagination.style.display = 'none';
                    return;
                }
                
                emptyState.style.display = 'none';
                pagination.style.display = 'flex';
                renderDataList(displayList);
                renderPagination(pag);
                
            } catch (error) {
                console.error('Error loading datasources:', error);
                showToast('加载失败', 'error');
                dataList.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--danger);">加载失败</div>';
                emptyState.style.display = 'none';
                pagination.style.display = 'none';
            }
        }

        // 渲染列表
        function renderDataList(list) {
            const dataList = document.getElementById('dataList');
            const iconMap = {
                mysql: { icon: '🐬', class: 'mysql' },
                postgresql: { icon: '🐘', class: 'postgresql' },
                mongodb: { icon: '🍃', class: 'mongodb' },
                api: { icon: '🔗', class: 'api' }
            };

            dataList.innerHTML = list.map(ds => {
                const typeInfo = iconMap[ds.sourceType] || { icon: '❓', class: 'mysql' };
                const config = ds.connectionConfig || {};
                let address = '-';
                let connectionInfo = '';
                
                if (ds.sourceType === 'api') {
                    address = config.url || '-';
                } else {
                    if (config.sshConfig) {
                        // SSH连接
                        address = `${config.host}:${config.port}`;
                        connectionInfo = ` (SSH: ${config.sshConfig.host}:${config.sshConfig.port})`;
                    } else {
                        // 直连
                        address = `${config.host}:${config.port}`;
                    }
                }

                const statusBadge = ds.status === 1 
                    ? '<span class="status-badge success"><span class="status-dot"></span>正常</span>' 
                    : '<span class="status-badge error"><span class="status-dot"></span>禁用</span>';

                return `
                <div class="data-card">
                    <div class="data-icon ${typeInfo.class}">${typeInfo.icon}</div>
                    <div class="data-info">
                        <div class="data-name">${ds.name} ${statusBadge}</div>
                        <div class="data-desc">${ds.description || '暂无描述'}</div>
                        <div class="data-meta">
                            <span>📍 ${address}${connectionInfo}</span>
                            <span>🕐 ${new Date(ds.createTime).toLocaleDateString()}</span>
                        </div>
                    </div>
                    <div class="data-actions">
                        <button class="action-btn" onclick="testConnection('${ds.id}')">🔗 测试</button>
                        <button class="action-btn" onclick="editDatasource('${ds.id}')">✎ 编辑</button>
                        <button class="action-btn danger" onclick="deleteDatasource('${ds.id}')">🗑</button>
                    </div>
                </div>`;
            }).join('');
        }

        // 渲染分页
        function renderPagination(pag) {
            const pagination = document.getElementById('pagination');
            const { total, page, totalPages } = pag;
            
            let html = `
                <div class="pagination-info">共 ${total} 条记录</div>
                <div class="pagination-btns">
                    <button class="page-btn" ${page <= 1 ? 'disabled' : ''} onclick="loadDatasources(${page - 1})">上一页</button>
                    <span style="margin: 0 10px;">第 ${page} / ${totalPages} 页</span>
                    <button class="page-btn" ${page >= totalPages ? 'disabled' : ''} onclick="loadDatasources(${page + 1})">下一页</button>
                </div>
            `;
            pagination.innerHTML = html;
        }

        // 筛选
        function filterDatasources() {
            loadDatasources(1);
        }

        // 类型选择逻辑
        function selectType(el, type) {
            document.querySelectorAll('.type-option').forEach(o => o.classList.remove('active'));
            el.classList.add('active');
            selectedType = type;
            
            // 切换配置表单
            const dbConfig = document.getElementById('dbConfig');
            const apiConfig = document.getElementById('apiConfig');
            
            if (type === 'api') {
                dbConfig.style.display = 'none';
                apiConfig.style.display = 'block';
                document.getElementById('dsPort').value = ''; // API不需要端口
            } else {
                dbConfig.style.display = 'block';
                apiConfig.style.display = 'none';
                
                // 设置默认端口
                const portInput = document.getElementById('dsPort');
                if (type === 'mysql') portInput.value = '3306';
                if (type === 'postgresql') portInput.value = '5432';
                if (type === 'mongodb') portInput.value = '27017';
            }
            
            // 重新初始化连接类型和认证方式选择
            initializeConnectionConfig();
        }
        
        // 初始化连接配置
        function initializeConnectionConfig() {
            const dbConfig = document.getElementById('dbConfig');
            if (dbConfig.style.display === 'block') {
                // 如果还没有连接类型选择，则添加
                let connectionTypeSelect = document.getElementById('connectionTypeSelect');
                if (!connectionTypeSelect) {
                    const connectionTypeRow = document.createElement('div');
                    connectionTypeRow.className = 'form-row';
                    connectionTypeRow.id = 'connectionTypeRow';
                    connectionTypeRow.innerHTML = `
                        <div class="form-group">
                            <label class="form-label">连接方式 *</label>
                            <select class="form-input" id="connectionType" onchange="toggleConnectionType()">
                                <option value="direct">直连</option>
                                <option value="ssh">SSH隧道</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">认证方式 *</label>
                            <select class="form-input" id="authType" onchange="toggleAuthType()">
                                <option value="password">用户名密码</option>
                                <option value="key">密钥认证</option>
                            </select>
                        </div>
                    `;
                    
                    // 在主机地址之前插入连接类型选择
                    dbConfig.insertBefore(connectionTypeRow, dbConfig.firstChild);
                    
                    // 初始化显示
                    toggleConnectionType();
                    toggleAuthType();
                } else {
                    // 如果已存在，则更新显示状态
                    toggleConnectionType();
                    toggleAuthType();
                }
            }
        }
        
        // 切换连接方式
        function toggleConnectionType() {
            const connectionType = document.getElementById('connectionType');
            if (!connectionType) return; // 元素不存在，直接返回
            
            const connectionTypeValue = connectionType.value;
            const sshConfig = document.getElementById('sshConfig');
            const dbConfig = document.getElementById('dbConfig');
            let authFields = document.getElementById('dbAuthFields');
            
            if (!sshConfig && dbConfig) {
                // 创建SSH配置区域
                const sshConfigDiv = document.createElement('div');
                sshConfigDiv.id = 'sshConfig';
                sshConfigDiv.className = 'ssh-config';
                sshConfigDiv.style.display = 'none';
                sshConfigDiv.innerHTML = `
                    <div class="form-group">
                        <label class="form-label">SSH主机 *</label>
                        <input type="text" class="form-input" id="sshHost" placeholder="SSH服务器地址">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">SSH端口 *</label>
                            <input type="number" class="form-input" id="sshPort" placeholder="22" value="22">
                        </div>
                        <div class="form-group">
                            <label class="form-label">SSH用户名 *</label>
                            <input type="text" class="form-input" id="sshUsername" placeholder="SSH用户名">
                        </div>
                    </div>
                    <div class="auth-fields" id="sshAuthFields">
                        <!-- SSH认证字段将通过JavaScript动态生成 -->
                    </div>
                `;
                
                dbConfig.appendChild(sshConfigDiv);
            }
            
            // 创建数据库认证字段区域（用于直连模式的密钥认证）
            if (!authFields && dbConfig) {
                const authFieldsDiv = document.createElement('div');
                authFieldsDiv.id = 'dbAuthFields';
                authFieldsDiv.className = 'db-auth-fields';
                authFieldsDiv.style.display = 'none';
                authFieldsDiv.innerHTML = `
                    <div class="form-group">
                        <label class="form-label">数据库认证方式 *</label>
                        <select class="form-input" id="dbAuthType" onchange="generateDbAuthFields()">
                            <option value="password">用户名密码</option>
                            <option value="key">密钥认证</option>
                        </select>
                    </div>
                    <div id="dbKeyAuthFields">
                        <!-- 数据库密钥认证字段 -->
                    </div>
                `;
                
                // 在数据库配置区域插入认证字段
                const dbConfigArea = document.getElementById('dbConfig');
                const portRow = dbConfigArea.querySelector('.form-row');
                if (portRow) {
                    dbConfigArea.insertBefore(authFieldsDiv, portRow.nextSibling);
                } else {
                    dbConfigArea.appendChild(authFieldsDiv);
                }
                
                // 更新authFields引用
                authFields = authFieldsDiv;
            }
            
            if (connectionTypeValue === 'ssh') {
                if (sshConfig) sshConfig.style.display = 'block';
                if (authFields) authFields.style.display = 'none';
                // 重新生成SSH认证字段
                generateSSHAuthFields();
            } else {
                if (sshConfig) sshConfig.style.display = 'none';
                if (authFields) authFields.style.display = 'block';
                // 生成数据库认证字段
                generateDbAuthFields();
            }
        }
        
        // 切换认证方式
        function toggleAuthType() {
            const authType = document.getElementById('authType');
            if (!authType) return; // 元素不存在，直接返回
            
            const sshConfig = document.getElementById('sshConfig');
            
            if (sshConfig && sshConfig.style.display === 'block') {
                // 如果是SSH连接，重新生成认证字段
                generateSSHAuthFields();
            }
        }
        
        // 生成SSH认证字段
        function generateSSHAuthFields() {
            const authType = document.getElementById('authType').value;
            const sshAuthFields = document.getElementById('sshAuthFields');
            
            if (authType === 'password') {
                sshAuthFields.innerHTML = `
                    <div class="form-group">
                        <label class="form-label">SSH密码 *</label>
                        <input type="password" class="form-input" id="sshPassword" placeholder="SSH密码">
                    </div>
                `;
            } else {
                sshAuthFields.innerHTML = `
                    <div class="form-group">
                        <label class="form-label">SSH私钥 *</label>
                        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                            <select class="form-input" id="sshKeySelect" onchange="handleKeySelection()" style="flex: 1;">
                                <option value="">选择已有密钥</option>
                            </select>
                            <button type="button" class="btn btn-secondary" onclick="window.open('ssh-keys.html', '_blank')" style="padding: 8px 12px;">
                                🔑 管理密钥
                            </button>
                        </div>
                        <div id="customKeyUpload" style="display: none;">
                            <div class="form-group">
                                <label class="form-label">或上传新密钥</label>
                                <input type="file" class="form-input" id="sshKeyFile" accept=".key,.pem,.ppk" onchange="handleKeyFileUpload(event)">
                                <div class="key-file-info" id="keyFileInfo" style="display: none; margin-top: 8px; font-size: 12px; color: var(--text-muted);">
                                    <span id="keyFileName"></span>
                                    <button type="button" onclick="removeKeyFile()" style="margin-left: 10px; color: var(--danger); background: none; border: none; cursor: pointer;">删除</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">密钥密码 (可选)</label>
                        <input type="password" class="form-input" id="sshKeyPassword" placeholder="如果密钥有密码，请输入">
                    </div>
                `;
                
                // 加载SSH密钥列表
                loadSshKeyOptions();
            }
        }
        
        // 加载SSH密钥选项
        async function loadSshKeyOptions() {
            const keySelect = document.getElementById('sshKeySelect');
            if (!keySelect) return;
            
            try {
                const response = await fetch('/system/ssh-keys?page=1&pageSize=100&status=1', {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('access_token')}`
                    }
                });
                
                if (response.ok) {
                    const result = await response.json();
                    const options = result.list.map(key => `<option value="${key.id}">${key.name} (${key.username || '无用户名'})</option>`).join('');
                    keySelect.innerHTML = '<option value="">选择已有密钥</option>' + options;
                }
            } catch (error) {
                console.error('Error loading SSH keys:', error);
            }
        }
        
        // 处理密钥选择
        function handleKeySelection() {
            const keySelect = document.getElementById('sshKeySelect');
            const selectedKeyId = keySelect.value;
            const customKeyUpload = document.getElementById('customKeyUpload');
            const sshKeyPassword = document.getElementById('sshKeyPassword');
            
            if (selectedKeyId) {
                // 选择已有密钥，隐藏上传
                customKeyUpload.style.display = 'none';
                
                // 加载密钥详情并填充密码
                fetch(`/system/ssh-keys/${selectedKeyId}`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('access_token')}`
                    }
                }).then(response => response.json())
                .then(key => {
                    if (key.keyPassword) {
                        sshKeyPassword.value = key.keyPassword;
                    }
                    window.sshKeyContent = key.privateKey;
                    window.sshKeyId = key.id;
                });
            } else {
                // 选择自定义上传，显示上传区域
                customKeyUpload.style.display = 'block';
                sshKeyPassword.value = '';
                window.sshKeyContent = null;
                window.sshKeyId = null;
            }
        }
        
        // 处理密钥文件上传
        function handleKeyFileUpload(event) {
            const file = event.target.files[0];
            if (file) {
                document.getElementById('keyFileInfo').style.display = 'block';
                document.getElementById('keyFileName').textContent = `已选择: ${file.name}`;
                
                // 读取文件内容并保存到临时变量
                const reader = new FileReader();
                reader.onload = function(e) {
                    window.sshKeyContent = e.target.result;
                };
                reader.readAsText(file);
            }
        }
        
        // 删除密钥文件
        function removeKeyFile() {
            document.getElementById('sshKeyFile').value = '';
            document.getElementById('keyFileInfo').style.display = 'none';
            window.sshKeyContent = null;
        }
        
        // 生成数据库认证字段
        function generateDbAuthFields() {
            const authType = document.getElementById('dbAuthType')?.value;
            const dbKeyAuthFields = document.getElementById('dbKeyAuthFields');
            
            if (!dbKeyAuthFields) return;
            
            if (authType === 'key') {
                dbKeyAuthFields.innerHTML = `
                    <div class="form-group">
                        <label class="form-label">SSH私钥 *</label>
                        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                            <select class="form-input" id="dbSshKeySelect" onchange="handleDbKeySelection()" style="flex: 1;">
                                <option value="">选择已有密钥</option>
                            </select>
                            <button type="button" class="btn btn-secondary" onclick="window.open('ssh-keys.html', '_blank')" style="padding: 8px 12px;">
                                🔑 管理密钥
                            </button>
                        </div>
                        <div id="dbCustomKeyUpload" style="display: none;">
                            <div class="form-group">
                                <label class="form-label">或上传新密钥</label>
                                <input type="file" class="form-input" id="dbSshKeyFile" accept=".key,.pem,.ppk" onchange="handleDbKeyFileUpload(event)">
                                <div class="key-file-info" id="dbKeyFileInfo" style="display: none; margin-top: 8px; font-size: 12px; color: var(--text-muted);">
                                    <span id="dbKeyFileName"></span>
                                    <button type="button" onclick="removeDbKeyFile()" style="margin-left: 10px; color: var(--danger); background: none; border: none; cursor: pointer;">删除</button>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">密钥密码 (可选)</label>
                            <input type="password" class="form-input" id="dbSshKeyPassword" placeholder="如果密钥有密码，请输入">
                        </div>
                    `;
                
                // 加载SSH密钥列表
                loadDbSshKeyOptions();
            } else {
                dbKeyAuthFields.innerHTML = '';
                // 恢复用户名密码输入
                const passwordField = document.getElementById('dsPassword');
                if (passwordField) passwordField.style.display = 'block';
            }
        }
        
        // 加载数据库SSH密钥选项
        async function loadDbSshKeyOptions() {
            const keySelect = document.getElementById('dbSshKeySelect');
            if (!keySelect) return;
            
            try {
                const response = await fetch('/system/ssh-keys?page=1&pageSize=100&status=1', {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('access_token')}`
                    }
                });
                
                if (response.ok) {
                    const result = await response.json();
                    const options = result.list.map(key => `<option value="${key.id}">${key.name} (${key.username || '无用户名'})</option>`).join('');
                    keySelect.innerHTML = '<option value="">选择已有密钥</option>' + options;
                }
            } catch (error) {
                console.error('Error loading SSH keys:', error);
            }
        }
        
        // 处理数据库密钥选择
        function handleDbKeySelection() {
            const keySelect = document.getElementById('dbSshKeySelect');
            const selectedKeyId = keySelect.value;
            const customKeyUpload = document.getElementById('dbCustomKeyUpload');
            const sshKeyPassword = document.getElementById('dbSshKeyPassword');
            const passwordField = document.getElementById('dsPassword');
            
            if (selectedKeyId) {
                // 选择已有密钥，隐藏上传和密码输入
                customKeyUpload.style.display = 'none';
                passwordField.style.display = 'none';
                
                // 加载密钥详情并填充密码
                fetch(`/system/ssh-keys/${selectedKeyId}`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('access_token')}`
                    }
                }).then(response => response.json())
                .then(key => {
                    if (key.keyPassword) {
                        sshKeyPassword.value = key.keyPassword;
                    }
                    window.dbSshKeyContent = key.privateKey;
                    window.dbSshKeyId = key.id;
                });
            } else {
                // 选择自定义上传，显示上传区域和密码输入
                customKeyUpload.style.display = 'block';
                passwordField.style.display = 'block';
                sshKeyPassword.value = '';
                window.dbSshKeyContent = null;
                window.dbSshKeyId = null;
            }
        }
        
        // 处理数据库密钥文件上传
        function handleDbKeyFileUpload(event) {
            const file = event.target.files[0];
            if (file) {
                document.getElementById('dbKeyFileInfo').style.display = 'block';
                document.getElementById('dbKeyFileName').textContent = `已选择: ${file.name}`;
                
                // 读取文件内容并保存到临时变量
                const reader = new FileReader();
                reader.onload = function(e) {
                    window.dbSshKeyContent = e.target.result;
                };
                reader.readAsText(file);
            }
        }
        
        // 删除数据库密钥文件
        function removeDbKeyFile() {
            document.getElementById('dbSshKeyFile').value = '';
            document.getElementById('dbKeyFileInfo').style.display = 'none';
            window.dbSshKeyContent = null;
        }

        // 打开新建模态框
        function openCreateModal() {
            document.getElementById('dsId').value = '';
            document.getElementById('modalTitle').textContent = '新增数据源';
            document.getElementById('dsName').value = '';
            document.getElementById('dsDesc').value = '';
            
            // 重置配置
            document.getElementById('dsHost').value = '';
            document.getElementById('dsPort').value = '3306';
            document.getElementById('dsDatabase').value = '';
            document.getElementById('dsUsername').value = '';
            document.getElementById('dsPassword').value = '';
            document.getElementById('dsUrl').value = '';
            document.getElementById('dsAuthHeader').value = '';
            
            // 重置连接配置（先检查元素是否存在）
            const connectionTypeEl = document.getElementById('connectionType');
            const authTypeEl = document.getElementById('authType');
            const sshHostEl = document.getElementById('sshHost');
            const sshPortEl = document.getElementById('sshPort');
            const sshUsernameEl = document.getElementById('sshUsername');
            const sshPasswordEl = document.getElementById('sshPassword');
            const sshKeyFileEl = document.getElementById('sshKeyFile');
            const sshKeyPasswordEl = document.getElementById('sshKeyPassword');
            const keyFileInfoEl = document.getElementById('keyFileInfo');
            
            if (connectionTypeEl) connectionTypeEl.value = 'direct';
            if (authTypeEl) authTypeEl.value = 'password';
            if (sshHostEl) sshHostEl.value = '';
            if (sshPortEl) sshPortEl.value = '22';
            if (sshUsernameEl) sshUsernameEl.value = '';
            if (sshPasswordEl) sshPasswordEl.value = '';
            if (sshKeyFileEl) sshKeyFileEl.value = '';
            if (sshKeyPasswordEl) sshKeyPasswordEl.value = '';
            if (keyFileInfoEl) keyFileInfoEl.style.display = 'none';
            
            window.sshKeyContent = null;
            
            // 默认选中 MySQL
            selectType(document.querySelector('.type-option'), 'mysql');
            
            openModal('createModal');
        }

        // 编辑数据源
        function editDatasource(id) {
            const ds = currentDatasources.find(d => d.id == id);
            if (!ds) return;
            
            document.getElementById('dsId').value = ds.id;
            document.getElementById('modalTitle').textContent = '编辑数据源';
            document.getElementById('dsName').value = ds.name;
            document.getElementById('dsDesc').value = ds.description || '';
            
            // 选中类型
            const typeOption = Array.from(document.querySelectorAll('.type-option')).find(el => el.textContent.toLowerCase().includes(ds.sourceType));
            if (typeOption) selectType(typeOption, ds.sourceType);
            
            // 填充配置
            const config = ds.connectionConfig || {};
            const authConfig = ds.authConfig || {};
            
            if (ds.sourceType === 'api') {
                document.getElementById('dsUrl').value = config.url || '';
                // Auth header extraction logic if needed
            } else {
                // 填充基础数据库配置
                document.getElementById('dsHost').value = config.host || '';
                document.getElementById('dsPort').value = config.port || '';
                document.getElementById('dsDatabase').value = config.database || '';
                document.getElementById('dsUsername').value = config.username || '';
                document.getElementById('dsPassword').value = config.password || '';
                
                // 填充SSH配置
                if (config.sshConfig) {
                    const connectionTypeEl = document.getElementById('connectionType');
                    const authTypeEl = document.getElementById('authType');
                    const sshHostEl = document.getElementById('sshHost');
                    const sshPortEl = document.getElementById('sshPort');
                    const sshUsernameEl = document.getElementById('sshUsername');
                    const sshPasswordEl = document.getElementById('sshPassword');
                    const sshKeyPasswordEl = document.getElementById('sshKeyPassword');
                    
                    if (connectionTypeEl) connectionTypeEl.value = 'ssh';
                    if (sshHostEl) sshHostEl.value = config.sshConfig.host || '';
                    if (sshPortEl) sshPortEl.value = config.sshConfig.port || '22';
                    if (sshUsernameEl) sshUsernameEl.value = config.sshConfig.username || '';
                    
                    // 设置认证方式
                    if (config.sshConfig.authType === 'key' && config.sshConfig.privateKey) {
                        if (authTypeEl) authTypeEl.value = 'key';
                        window.sshKeyContent = config.sshConfig.privateKey;
                        if (sshKeyPasswordEl) sshKeyPasswordEl.value = config.sshConfig.keyPassword || '';
                    } else {
                        if (authTypeEl) authTypeEl.value = 'password';
                        if (sshPasswordEl) sshPasswordEl.value = config.sshConfig.password || '';
                    }
                } else {
                    const connectionTypeEl = document.getElementById('connectionType');
                    if (connectionTypeEl) connectionTypeEl.value = 'direct';
                }
                
                // 初始化连接配置显示
                initializeConnectionConfig();
                toggleConnectionType();
                toggleAuthType();
            }
            
            openModal('createModal');
        }

        // 保存数据源
        async function saveDatasource() {
            const id = document.getElementById('dsId').value;
            const name = document.getElementById('dsName').value;
            const desc = document.getElementById('dsDesc').value;
            
            if (!name) { showToast('请填写数据源名称', 'error'); return; }
            
            let connectionConfig = {};
            let authConfig = {};
            
            if (selectedType === 'api') {
                const url = document.getElementById('dsUrl').value;
                if (!url) { showToast('请填写基础URL', 'error'); return; }
                connectionConfig = { url };
            } else {
                const host = document.getElementById('dsHost').value;
                const port = document.getElementById('dsPort').value;
                const database = document.getElementById('dsDatabase').value;
                const username = document.getElementById('dsUsername').value;
                const password = document.getElementById('dsPassword').value;
                
                if (!host || !port || !database || !username) {
                    showToast('请填写完整的数据库连接信息', 'error'); 
                    return;
                }
                
                // 检查连接方式
                const connectionType = document.getElementById('connectionType').value;
                
                if (connectionType === 'direct') {
                    // 直连模式 - 检查数据库认证方式
                    const dbAuthType = document.getElementById('dbAuthType')?.value;
                    
                    if (dbAuthType === 'key') {
                        // 直连密钥认证
                        const selectedKeyId = document.getElementById('dbSshKeySelect')?.value;
                        
                        if (selectedKeyId) {
                            // 使用已有密钥
                            if (!window.dbSshKeyContent) {
                                showToast('请选择数据库私钥', 'error'); 
                                return;
                            }
                            connectionConfig = { 
                                host, 
                                port, 
                                database, 
                                username, 
                                password,
                                sshKeyId: parseInt(selectedKeyId)
                            };
                            connectionConfig.privateKey = window.dbSshKeyContent;
                            connectionConfig.keyAuthType = 'key';
                            
                            const keyPassword = document.getElementById('dbSshKeyPassword').value;
                            if (keyPassword) {
                                authConfig.sshKeyPassword = keyPassword;
                            }
                        } else {
                            // 上传新密钥
                            if (!window.dbSshKeyContent) {
                                showToast('请上传数据库私钥', 'error'); 
                                return;
                            }
                            connectionConfig = { 
                                host, 
                                port, 
                                database, 
                                username,
                                privateKey: window.dbSshKeyContent,
                                keyAuthType: 'key'
                            };
                            
                            const keyPassword = document.getElementById('dbSshKeyPassword').value;
                            if (keyPassword) {
                                authConfig.sshKeyPassword = keyPassword;
                            }
                        }
                    } else {
                        // 直连用户名密码认证
                        connectionConfig = { host, port, database, username, password };
                    }
                } else {
                    // SSH连接
                    const sshHost = document.getElementById('sshHost').value;
                    const sshPort = document.getElementById('sshPort').value || '22';
                    const sshUsername = document.getElementById('sshUsername').value;
                    
                    if (!sshHost || !sshUsername) {
                        showToast('请填写完整的SSH连接信息', 'error'); 
                        return;
                    }
                    
                    const sshConfig = {
                        host: sshHost,
                        port: parseInt(sshPort),
                        username: sshUsername
                    };
                    
                    // 认证方式
                    const authType = document.getElementById('authType').value;
                    if (authType === 'password') {
                        const sshPassword = document.getElementById('sshPassword').value;
                        if (!sshPassword) {
                            showToast('请填写SSH密码', 'error'); 
                            return;
                        }
                        sshConfig.authType = 'password';
                        sshConfig.password = sshPassword;
                        authConfig.sshPassword = sshPassword;
                    } else {
                        // 密钥认证 - 检查是否选择了已有密钥或上传了新密钥
                        const selectedKeyId = document.getElementById('sshKeySelect')?.value;
                        
                        if (selectedKeyId) {
                            // 使用已有密钥
                            sshConfig.authType = 'key';
                            sshConfig.privateKey = window.sshKeyContent;
                            sshConfig.sshKeyId = parseInt(selectedKeyId);
                            const keyPassword = document.getElementById('sshKeyPassword').value;
                            if (keyPassword) {
                                sshConfig.keyPassword = keyPassword;
                                authConfig.sshKeyPassword = keyPassword;
                            }
                        } else {
                            // 使用上传的新密钥
                            if (!window.sshKeyContent) {
                                showToast('请选择或上传SSH私钥', 'error'); 
                                return;
                            }
                            sshConfig.authType = 'key';
                            sshConfig.privateKey = window.sshKeyContent;
                            const keyPassword = document.getElementById('sshKeyPassword').value;
                            if (keyPassword) {
                                sshConfig.keyPassword = keyPassword;
                                authConfig.sshKeyPassword = keyPassword;
                            }
                        }
                    }
                    
                    connectionConfig = { 
                        host, 
                        port, 
                        database, 
                        username, 
                        password,
                        sshConfig 
                    };
                }
            }
            
            const payload = {
                name,
                sourceType: selectedType,
                description: desc,
                connectionConfig,
                ...(Object.keys(authConfig).length > 0 && { authConfig }),
                status: 1
            };
            
            const isEdit = !!id;
            const url = isEdit ? `/system/data-sources/${id}` : '/system/data-sources';
            const method = isEdit ? 'PUT' : 'POST';
            
            try {
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('access_token')}`
                    },
                    body: JSON.stringify(payload)
                });
                
                if (response.ok) {
                    showToast(isEdit ? '更新成功' : '创建成功');
                    closeModal('createModal');
                    loadDatasources(isEdit ? currentPage : 1);
                } else {
                    const err = await response.json();
                    showToast(err.message || '操作失败', 'error');
                }
            } catch (error) {
                showToast('网络错误', 'error');
            }
        }

        // 删除数据源
        async function deleteDatasource(id) {
            if (!confirm('确定要删除这个数据源吗？')) return;
            
            try {
                const response = await fetch(`/system/data-sources/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('access_token')}`
                    }
                });
                
                if (response.ok) {
                    showToast('删除成功');
                    loadDatasources(currentPage);
                } else {
                    showToast('删除失败', 'error');
                }
            } catch (error) {
                showToast('网络错误', 'error');
            }
        }

        // 测试连接
        async function testConnection(id) {
            const btn = event.target; // Simple way to get button, might need improvement
            const originalText = btn.textContent;
            btn.textContent = '⏳';
            btn.disabled = true;
            
            try {
                const response = await fetch(`/system/data-sources/${id}/test`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('access_token')}`
                    }
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast('连接成功！');
                } else {
                    showToast('连接失败: ' + (result.message || '未知错误'), 'error');
                }
            } catch (error) {
                showToast('测试请求失败', 'error');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        // Toast
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (type === 'error') toast.style.borderLeftColor = 'var(--danger)';
            toast.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function openModal(id) { document.getElementById(id).classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }
        document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if (e.target === o) o.classList.remove('show'); }));
    </script>
</body>
