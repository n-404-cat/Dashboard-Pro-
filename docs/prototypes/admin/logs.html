<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操作日志 - 数据大屏管理系统</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .date-range {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .date-range input {
            height: 36px;
            padding: 0 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
        }

        .log-table {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }

        .log-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .log-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: white;
        }

        .log-info {
            display: flex;
            flex-direction: column;
        }

        .log-name {
            font-weight: 500;
            color: var(--text-dark);
        }

        .log-ip {
            font-size: 12px;
            color: var(--text-muted);
        }

        .action-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .action-badge.create {
            background: rgba(40, 167, 69, 0.1);
            color: var(--success);
        }

        .action-badge.update {
            background: rgba(74, 144, 217, 0.1);
            color: var(--primary-lighter);
        }

        .action-badge.delete {
            background: rgba(220, 53, 69, 0.1);
            color: var(--danger);
        }

        .action-badge.login {
            background: rgba(23, 162, 184, 0.1);
            color: var(--info);
        }

        .action-badge.logout {
            background: rgba(108, 117, 125, 0.1);
            color: #6C757D;
        }

        .action-badge.export {
            background: rgba(255, 193, 7, 0.1);
            color: #B8860B;
        }

        .module-badge {
            padding: 2px 8px;
            background: var(--bg-light);
            border-radius: 4px;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .filter-bar {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>

<body>
    <!-- 引入布局脚本 -->
    <script src="layout.js"></script>

    <!-- 主内容区 -->
    <main class="main">
        <div class="page-header">
            <div class="page-title-group">
                <h1 class="page-title">操作日志</h1>
                <div class="breadcrumb"><a
                        href="dashboard.html">首页</a><span>/</span><span>系统设置</span><span>/</span><span>操作日志</span></div>
            </div>
            <button class="btn btn-secondary" onclick="exportLogs()">📤 导出日志</button>
        </div>

        <div class="filter-bar">
            <select class="filter-select" id="actionFilter" onchange="filterLogs()">
                <option value="">全部操作</option>
                <option value="create">创建</option>
                <option value="update">更新</option>
                <option value="delete">删除</option>
                <option value="login">登录</option>
                <option value="logout">登出</option>
            </select>
            <select class="filter-select" id="moduleFilter" onchange="filterLogs()">
                <option value="">全部模块</option>
                <option value="template">模板管理</option>
                <option value="datasource">数据源管理</option>
                <option value="user">用户管理</option>
                <option value="system">系统设置</option>
            </select>
            <div class="date-range">
                <input type="date" id="startDate" onchange="filterLogs()">
                <span>至</span>
                <input type="date" id="endDate" onchange="filterLogs()">
            </div>
            <button class="btn btn-secondary" onclick="resetFilter()">重置</button>
        </div>

        <div class="log-table">
            <table class="table">
                <thead>
                    <tr>
                        <th>操作者</th>
                        <th>操作类型</th>
                        <th>操作模块</th>
                        <th>操作描述</th>
                        <th>操作时间</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="logTableBody">
                    <!-- 数据将通过 API 加载 -->
                </tbody>
            </table>

            <div class="pagination" id="paginationContainer">
                <!-- 分页信息将动态渲染 -->
            </div>
        </div>
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API_BASE = '/system/logs';
        let currentPage = 1;

        async function fetchLogs(page = 1) {
            currentPage = page;
            const action = document.getElementById('actionFilter').value;
            const module = document.getElementById('moduleFilter').value;
            const startTime = document.getElementById('startDate').value;
            const endTime = document.getElementById('endDate').value;

            let url = `${API_BASE}?page=${page}&pageSize=10`;
            if (action) url += `&operation=${action}`;
            if (module) url += `&module=${module}`;
            if (startTime) url += `&startTime=${startTime}T00:00:00`;
            if (endTime) url += `&endTime=${endTime}T23:59:59`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network response was not ok');
                const result = await response.json();
                renderLogs(result.list || []);
                window.adminLayout.renderPagination('paginationContainer', result.pagination || { total: 0, page: 1, totalPages: 1 }, fetchLogs);
            } catch (err) {
                console.error('Failed to fetch logs', err);
                showToast('加载日志失败', 'danger');
            }
        }

        function renderLogs(logs) {
            const tbody = document.getElementById('logTableBody');
            if (!logs || logs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px; color: var(--text-muted);">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = logs.map(log => {
                const operation = log.operation || 'operation';
                const operationClass = operation.toLowerCase();
                const actionIcon = getActionIcon(operation);
                const avatarColor = getAvatarColor(log.username || 'U');
                const statusColor = (log.statusCode || 200) < 400 ? 'var(--success)' : 'var(--danger)';
                const statusText = (log.statusCode || 200) < 400 ? '✓ 成功' : '✗ 失败';

                return `
                    <tr>
                        <td>
                            <div class="log-user">
                                <div class="log-avatar" style="background: ${avatarColor}">${(log.username || 'U')[0].toUpperCase()}</div>
                                <div class="log-info">
                                    <span class="log-name">${log.username || '系统'}</span>
                                    <span class="log-ip">${log.ipAddress || '-'}</span>
                                </div>
                            </div>
                        </td>
                        <td><span class="action-badge ${operationClass}">${actionIcon} ${translateAction(operation)}</span></td>
                        <td><span class="module-badge">${translateModule(log.module || '')}</span></td>
                        <td>${log.requestParams ? truncate(log.requestParams, 50) : (log.operation || '-')}</td>
                        <td>${new Date(log.createTime).toLocaleString()}</td>
                        <td><span style="color: ${statusColor};">${statusText}</span></td>
                    </tr>
                `;
            }).join('');
        }

        function truncate(str, n) {
            if (!str) return '';
            return (str.length > n) ? str.substr(0, n - 1) + '...' : str;
        }


        function getActionIcon(action) {
            const icons = { create: '➕', update: '✏️', delete: '🗑', login: '🔑', logout: '🚪', export: '📤' };
            return icons[action.toLowerCase()] || '⚙️';
        }

        function translateAction(action) {
            const map = { create: '创建', update: '更新', delete: '删除', login: '登录', logout: '登出', export: '导出' };
            return map[action.toLowerCase()] || action;
        }

        function translateModule(module) {
            const map = { template: '模板管理', datasource: '数据源管理', user: '用户管理', system: '系统设置' };
            return map[module.toLowerCase()] || module;
        }

        function getAvatarColor(name) {
            const colors = [
                'linear-gradient(135deg, #667eea, #764ba2)',
                'linear-gradient(135deg, #f093fb, #f5576c)',
                'linear-gradient(135deg, #4facfe, #00f2fe)',
                'linear-gradient(135deg, #fa709a, #fee140)'
            ];
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length];
        }

        function filterLogs() {
            fetchLogs(1);
        }

        function resetFilter() {
            document.getElementById('actionFilter').value = '';
            document.getElementById('moduleFilter').value = '';
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
            fetchLogs(1);
        }

        function exportLogs() {
            showToast('日志导出中...');
            setTimeout(() => {
                showToast('日志导出成功');
            }, 1500);
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (type === 'danger') {
                toast.style.background = '#ff4d4f';
            }
            toast.innerHTML = `<span>${type === 'danger' ? '✗' : '✓'}</span><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // 初始加载
        document.addEventListener('DOMContentLoaded', () => {
            fetchLogs(1);
        });
    </script>
</body>

</html>
